name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache emsdk
        uses: actions/cache@v4
        with:
          path: ~/emsdk
          key: emsdk-${{ hashFiles('firmware/tools/build-wasm.sh') }}

      - name: Install emsdk
        run: |
          if [ ! -d ~/emsdk ]; then
            git clone https://github.com/emscripten-core/emsdk.git ~/emsdk
          fi
          ~/emsdk/emsdk install latest
          ~/emsdk/emsdk activate latest

      - name: Build WASM
        run: |
          source ~/emsdk/emsdk_env.sh
          bash firmware/tools/build-wasm.sh

      - name: Package WASM artifact
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist
          zip -j "dist/nema-wasm-${VERSION}.zip" \
            packages/forge/static/wasm/nema.js \
            packages/forge/static/wasm/nema.wasm

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/nema-wasm-*.zip
