name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── 1. Create/update the Release PR; cut the release when merged ───────────────
  release-please:
    name: Release PR / tag
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ── 2. Build + attach WASM simulator firmware ─────────────────────────────────
  release-wasm:
    name: Release — WASM simulator
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache emsdk
        uses: actions/cache@v4
        with:
          path: ~/emsdk
          key: emsdk-${{ hashFiles('firmware/tools/build-wasm.sh') }}

      - name: Install emsdk
        run: |
          if [ ! -d ~/emsdk ]; then
            git clone https://github.com/emscripten-core/emsdk.git ~/emsdk
          fi
          ~/emsdk/emsdk install latest
          ~/emsdk/emsdk activate latest

      - name: Build WASM
        run: |
          source ~/emsdk/emsdk_env.sh
          bash firmware/tools/build-wasm.sh

      - name: Package simulator firmware
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          mkdir -p dist
          # Ship both files in one zip (the browser needs .js + .wasm together)
          zip -j "dist/palanu-simulator-${TAG}.zip" \
            packages/forge/static/wasm/palanu.js \
            packages/forge/static/wasm/palanu.wasm

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: dist/palanu-simulator-*.zip

  # ── 3. Build + attach ESP32 firmware (matrix: one leg per board) ──────────────
  # package-firmware.sh emits two clearly-named artifacts per board:
  #   palanu-<board>-<tag>-factory.bin  → cable flash to 0x0 (blank board / recovery)
  #   palanu-<board>-<tag>-ota.bin      → OTA update (app-only → A/B slot)
  # plus .sha256 sidecars. Both are attached to the GitHub release.
  release-esp32:
    name: Release — ESP32 (${{ matrix.board }})
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board: [skyrizz-e32, skyrizz-solana]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache ESP-IDF tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.espressif
            ~/esp-idf
          key: esp-idf-v5.5.4-${{ runner.os }}

      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            git wget flex bison gperf python3 python3-pip python3-venv \
            cmake ninja-build ccache libffi-dev libssl-dev dfu-util libusb-1.0-0

      - name: Install ESP-IDF v5.5.4
        run: |
          if [ ! -f ~/esp-idf/export.sh ]; then
            git clone --depth 1 --branch v5.5.4 https://github.com/espressif/esp-idf.git ~/esp-idf
          fi
          ~/esp-idf/install.sh esp32s3

      - name: Build + package (factory + ota)
        env:
          FW_VERSION: ${{ needs.release-please.outputs.tag_name }}
        run: |
          source ~/esp-idf/export.sh
          bash firmware/tools/package-firmware.sh ${{ matrix.board }}

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: firmware/targets/${{ matrix.board }}/build/dist/*

  # ── 4. Attach the flashing guide (once) ───────────────────────────────────────
  release-flashing-guide:
    name: Release — flashing guide
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Attach FLASHING.md
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: docs/FLASHING.md
