name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Firmware tests (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build & run tests
        run: |
          cmake -S firmware -B firmware/build -G "Unix Makefiles"
          cmake --build firmware/build -j$(nproc)
          ctest --test-dir firmware/build --output-on-failure

  wasm:
    name: WASM simulator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache emsdk
        uses: actions/cache@v4
        with:
          path: ~/emsdk
          key: emsdk-${{ hashFiles('firmware/tools/build-wasm.sh') }}

      - name: Install emsdk
        run: |
          if [ ! -d ~/emsdk ]; then
            git clone https://github.com/emscripten-core/emsdk.git ~/emsdk
          fi
          ~/emsdk/emsdk install latest
          ~/emsdk/emsdk activate latest

      - name: Build WASM
        run: |
          source ~/emsdk/emsdk_env.sh
          bash firmware/tools/build-wasm.sh

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: nema-wasm
          path: |
            packages/forge/static/wasm/nema.js
            packages/forge/static/wasm/nema.wasm
          retention-days: 30
