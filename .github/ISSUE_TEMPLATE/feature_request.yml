name: Feature request
description: Suggest a new app, board, driver, or core capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or limitation you're hitting.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? An app, a new board/driver, a core feature?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - App
        - New board / driver
        - Core runtime
        - UI / layout
        - Simulator
        - Tooling / build
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
