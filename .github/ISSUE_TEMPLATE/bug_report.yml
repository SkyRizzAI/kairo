name: Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Please fill in the details below.
        For **security vulnerabilities, do not file here** — see our
        [Security Policy](../../SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Flash skyrizz-e32
        2. Open the Camera app
        3. ...
    validations:
      required: true
  - type: dropdown
    id: where
    attributes:
      label: Where does it happen?
      multiple: true
      options:
        - Simulator (WASM / browser)
        - skyrizz-e32 (hardware)
        - dev-board (hardware)
        - Host build / tests
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Firmware version / commit
      description: Output of the About screen, or the git commit hash.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste output from the Logs screen / serial console. Will be formatted as code.
      render: shell
    validations:
      required: false
